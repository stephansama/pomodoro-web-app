<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>og</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 1200px; height: 630px; }
      body {
        background: #ba4949;
        color: #fff;
        font-family: "Inter", system-ui, sans-serif;
        display: flex;
        align-items: stretch;
        overflow: hidden;
        position: relative;
      }
      body::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(
          90% 70% at 50% -10%,
          rgba(255, 255, 255, 0.16),
          transparent 60%
        );
      }
      .card {
        position: relative;
        display: flex;
        width: 100%;
        height: 100%;
        padding: 64px;
        gap: 56px;
      }

      /* left column: timer hero */
      .left {
        flex: 0 0 400px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .ring {
        position: relative;
        width: 380px;
        height: 380px;
      }
      .ring > svg { width: 100%; height: 100%; display: block; }
      .center {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .tomato {
        width: 56px;
        height: 56px;
        display: block;
      }
      .num {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-weight: 600;
        font-size: 84px;
        letter-spacing: -0.03em;
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }

      /* right column */
      .right {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 18px;
        min-width: 0;
      }
      .kicker {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.18em;
        color: rgba(255, 255, 255, 0.7);
        text-transform: uppercase;
      }
      .wordmark {
        font-size: 58px;
        font-weight: 700;
        letter-spacing: -0.025em;
        line-height: 1.04;
        white-space: nowrap;
      }
      .tagline {
        font-size: 26px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.82);
        line-height: 1.3;
      }

      .byline {
        position: absolute;
        right: 64px;
        bottom: 52px;
        font-size: 20px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.72);
      }
      .byline b {
        font-weight: 600;
        color: rgba(255, 255, 255, 0.96);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="left">
        <div class="ring">
          <svg viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg">
            <circle cx="180" cy="180" r="160" fill="none"
                    stroke="rgba(255,255,255,0.28)" stroke-width="14" />
            <circle cx="180" cy="180" r="160" fill="none"
                    stroke="#ffffff" stroke-width="14" stroke-linecap="round"
                    stroke-dasharray="1005"
                    stroke-dashoffset="220"
                    transform="rotate(-90 180 180)" />
          </svg>
          <div class="center">
            <svg class="tomato" viewBox="0 0 24 24"
                 xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M13.4 6.1c0-1.5 1.4-2.5 3.5-2.3-.2 2-1.6 3.1-3.5 3"
                    fill="#fff" />
              <path d="M13.4 6.6c-.1-1.1-.9-1.9-2.1-2.1" stroke="#fff"
                    stroke-width="1.4" stroke-linecap="round" fill="none" />
              <circle cx="12" cy="15" r="6.5" fill="none" stroke="#fff"
                      stroke-width="1.7" />
            </svg>
            <div class="num">25:00</div>
          </div>
        </div>
      </div>
      <div class="right">
        <div class="kicker">Pomodoro Timer</div>
        <div class="wordmark">pomodoro-web-app</div>
        <div class="tagline">Focus, in slices.</div>
      </div>
      <div class="byline">by <b>@stephansama</b></div>
    </div>
  </body>
</html>
